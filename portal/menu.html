<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Menú - Café Wilmer</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f8f8f8; }
    header { background: #2c3e50; color: white; padding: 20px; text-align: center; }
    nav { background: #34495e; padding: 10px; text-align: center; }
    nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; }
    nav a:hover { color: #e67e22; }
    .menu-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; padding: 40px; }
    .menu-item { width: 200px; background: #fff; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); padding: 10px; text-align: center; }
    .menu-item img { width: 100%; border-radius: 10px; }
    .menu-item p { margin-top: 10px; font-weight: bold; color: #2c3e50; }
  </style>
</head>
<body>
  <header>
    <h1>Menú</h1>
  </header>

  <nav>
    <a href="index.html">Inicio</a>
    <a href="menu.html">Menú</a>
    <a href="contacto.html">Contacto</a>
  </nav>

  <div class="menu-container">
    <div class="menu-item">
      <img src="espresso.png" alt="Café espresso">
      <p>Café espresso</p>
    </div>
    <div class="menu-item">
      <img src="capuchino.png" alt="Capuchino">
      <p>Capuchino</p>
    </div>
    <div class="menu-item">
      <img src="latte.png" alt="Latte">
      <p>Latte</p>
    </div>
    <div class="menu-item">
      <img src="postre.png" alt="Postres artesanales">
      <p>Postres artesanales</p>
    </div>
  </div>
</body>
</html>
